services:
  - type: web
    name: denialnet
    env: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn routes:app --host 0.0.0.0 --port $PORT --workers 2
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: DENIALNET_QUERY_COST_CENTS
        value: "75"
      - key: DENIALNET_CONTRIBUTOR_SPLIT
        value: "0.70"
